<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Chat - TchitChat</title>
    <link rel="icon" type="image/x-icon" href="../tchitchat.ico">
    <style>
        :root { --bg: #f8fbff; --card-bg: white; --text: #1f1f1f; --border: #e1e4e8; }
        [data-theme="dark"] { --bg: #131314; --card-bg: #1e1e20; --text: #e3e3e3; --border: #444746; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: var(--text); height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }
        header { padding: 15px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
        #chatMessages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .message { max-width: 85%; padding: 12px 16px; border-radius: 20px; font-size: 15px; line-height: 1.5; white-space: pre-wrap; }
        .user-msg { align-self: flex-end; background: #4285f4; color: white; border-bottom-right-radius: 4px; }
        .ai-msg { align-self: flex-start; background: var(--card-bg); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
        .input-area { padding: 15px 20px 25px 20px; }
        .input-box { background: var(--card-bg); border-radius: 28px; display: flex; align-items: center; padding: 5px 20px; border: 1px solid var(--border); }
        input { flex: 1; border: none; outline: none; padding: 12px 0; background: transparent; color: var(--text); font-size: 16px; }
        .send-btn { cursor: pointer; padding: 5px; }
    </style>
</head>
<body>
    <header>
        <button onclick="location.href='../'" style="background:none; border:none; cursor:pointer;"><img src="../back.png" width="24"></button>
        <div style="font-weight: 600;">TchitChat AI</div>
        <img src="../logo.png" width="32" style="border-radius: 8px;">
    </header>

    <div id="chatMessages"></div>

    <div class="input-area">
        <div class="input-box">
            <input type="text" id="userInput" placeholder="Message...">
            <div class="send-btn" id="sendBtn"><img src="../send.png" width="28"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, updateDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyDU4105kXewXvvBlxkfH8MJNe6x0FQSB4o", authDomain: "tchitchat-ia.firebaseapp.com", projectId: "tchitchat-ia", storageBucket: "tchitchat-ia.firebasestorage.app", messagingSenderId: "784697397736", appId: "1:784697397736:web:55295804d84feafda7945d" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const API_KEY = "TON_API_KEY_ICI"; // Remplace ici
        const urlParams = new URLSearchParams(window.location.search);
        const chatId = urlParams.get('id');

        document.documentElement.setAttribute('data-theme', localStorage.getItem('theme') || 'light');

        function addMessage(text, isUser) {
            const div = document.createElement('div');
            div.className = `message ${isUser ? 'user-msg' : 'ai-msg'}`;
            div.innerText = text;
            document.getElementById('chatMessages').appendChild(div);
            document.getElementById('chatMessages').scrollTop = document.getElementById('chatMessages').scrollHeight;
        }

        // --- SAUVEGARDE FIREBASE ---
        async function saveMessage(text, isUser) {
            const chatRef = doc(db, "chats", chatId);
            const chatSnap = await getDoc(chatRef);
            if (!chatSnap.exists()) {
                await setDoc(chatRef, { messages: [{ text, isUser, time: Date.now() }] });
            } else {
                await updateDoc(chatRef, { messages: arrayUnion({ text, isUser, time: Date.now() }) });
            }
        }

        // --- APPEL GEMINI ---
        async function askGemini(prompt) {
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });
                const data = await response.json();
                const aiText = data.candidates[0].content.parts[0].text;
                addMessage(aiText, false);
                saveMessage(aiText, false);
            } catch (e) {
                addMessage("Erreur d'accès à Gemini. Vérifie ta clé ou ton âge Google.", false);
            }
        }

        async function handleSend() {
            const text = document.getElementById('userInput').value.trim();
            if (!text) return;
            addMessage(text, true);
            document.getElementById('userInput').value = '';
            await saveMessage(text, true);
            askGemini(text);
        }

        document.getElementById('sendBtn').onclick = handleSend;
        document.getElementById('userInput').onkeypress = (e) => { if(e.key === 'Enter') handleSend(); };

        // --- CHARGEMENT HISTORIQUE ---
        onAuthStateChanged(auth, async (user) => {
            const chatRef = doc(db, "chats", chatId);
            const chatSnap = await getDoc(chatRef);
            if (chatSnap.exists()) {
                chatSnap.data().messages.forEach(m => addMessage(m.text, m.isUser));
            } else {
                // Premier message si nouveau chat
                const welcome = localStorage.getItem('lang') === 'fr' ? "Salut ! Je suis Gemini. Pose-moi une question." : "Hi! I'm Gemini. Ask me anything.";
                addMessage(welcome, false);
            }
        });
    </script>
</body>
</html>
