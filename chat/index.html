<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Chat - TchitChat</title>
    <style>
        :root { --bg: #f8fbff; --card-bg: white; --text: #1f1f1f; --border: #e1e4e8; }
        [data-theme="dark"] { --bg: #131314; --card-bg: #1e1e20; --text: #e3e3e3; --border: #444746; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: var(--text); height: 100dvh; display: flex; flex-direction: column; }
        
        header { padding: 15px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
        .back-btn { cursor: pointer; background: none; border: none; color: #4285f4; font-weight: bold; }

        #chatMessages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        
        .message { max-width: 80%; padding: 12px 16px; border-radius: 18px; font-size: 15px; line-height: 1.4; }
        .user-msg { align-self: flex-end; background: #4285f4; color: white; border-bottom-right-radius: 4px; }
        .ai-msg { align-self: flex-start; background: var(--card-bg); border: 1px solid var(--border); border-bottom-left-radius: 4px; }

        .input-area { padding: 20px; }
        .input-box { background: var(--card-bg); border-radius: 28px; display: flex; align-items: center; padding: 5px 20px; border: 1px solid var(--border); }
        input { flex: 1; border: none; outline: none; padding: 12px 0; background: transparent; color: var(--text); font-size: 16px; }
    </style>
</head>
<body>
    <header>
        <button class="back-btn" onclick="location.href='index.html'">← Back</button>
        <div id="chatIdDisplay" style="font-size: 12px; opacity: 0.6;">Chat ID: ...</div>
        <img src="logo.png" width="30">
    </header>

    <div id="chatMessages">
        </div>

    <div class="input-area">
        <div class="input-box">
            <input type="text" id="userInput" placeholder="Message...">
            <img src="send.png" width="25" id="sendBtn" style="cursor:pointer">
        </div>
    </div>

    <script type="module">
        const urlParams = new URLSearchParams(window.location.search);
        const chatId = urlParams.get('id');
        const initialMsg = urlParams.get('msg');
        
        document.getElementById('chatIdDisplay').innerText = `ID: ${chatId}`;
        document.documentElement.setAttribute('data-theme', localStorage.getItem('theme') || 'light');

        const chatBox = document.getElementById('chatMessages');

        function addMessage(text, isUser) {
            const div = document.createElement('div');
            div.className = `message ${isUser ? 'user-msg' : 'ai-msg'}`;
            div.innerText = text;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        // Si l'utilisateur a envoyé un message depuis l'accueil
        if (initialMsg) {
            addMessage(decodeURIComponent(initialMsg), true);
            setTimeout(() => addMessage("Je suis TchitChat, comment puis-je t'aider sur cette session ?", false), 1000);
        }

        document.getElementById('sendBtn').onclick = () => {
            const val = document.getElementById('userInput').value;
            if(!val) return;
            addMessage(val, true);
            document.getElementById('userInput').value = '';
            // Simuler réponse IA
            setTimeout(() => addMessage("Ceci est une démo de la session " + chatId, false), 1000);
        };
    </script>
</body>
</html>
