<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Mon Compte - TchitChat</title>
    <link rel="icon" type="image/x-icon" href="../tchitchat.ico">
    <style>
        :root {
            --bg: #f8fbff;
            --card-bg: white;
            --text: #1f1f1f;
            --border: #dce1e7;
            --accent: #4285f4;
            --danger: #d93025;
        }

        [data-theme="dark"] {
            --bg: #131314;
            --card-bg: #1e1e20;
            --text: #e3e3e3;
            --border: #444746;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; transition: background 0.3s, color 0.3s; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: var(--text); min-height: 100dvh; }

        header { padding: 15px; display: flex; align-items: center; border-bottom: 1px solid var(--border); }
        
        .back-btn { 
            width: 40px; height: 40px; cursor: pointer; 
            display: flex; align-items: center; justify-content: center;
            border: none; background: transparent;
        }
        /* Suppression du filter invert pour garder les couleurs d'origine de back.png */
        .back-btn img { width: 24px; display: block; }

        .container { max-width: 500px; margin: 40px auto; padding: 0 20px; text-align: center; }
        .user-email { font-size: 18px; font-weight: 600; margin-bottom: 30px; opacity: 0.8; }

        .menu-list { display: flex; flex-direction: column; gap: 12px; }

        .btn-action {
            width: 100%; padding: 16px; background: var(--card-bg); border: 1px solid var(--border);
            border-radius: 16px; color: var(--text); font-size: 16px; font-weight: 500;
            cursor: pointer; text-align: left; display: flex; justify-content: space-between; align-items: center;
        }
        .btn-action:hover { background: var(--border); }
        .btn-danger { color: var(--danger); border-color: var(--danger); }

        /* --- MODALS --- */
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); z-index: 1000; justify-content: center; align-items: center;
        }
        .modal-content {
            background: var(--card-bg); padding: 25px; border-radius: 24px;
            width: 90%; max-width: 400px; text-align: center;
        }
        .modal-btns { display: flex; gap: 10px; margin-top: 20px; }
        .modal-btns button { flex: 1; padding: 12px; border-radius: 10px; border: none; cursor: pointer; font-weight: 600; }
        
        /* --- LANGUE POPUP --- */
        .lang-option {
            display: flex; align-items: center; justify-content: space-between;
            padding: 12px; margin: 5px 0; border-radius: 10px; cursor: pointer;
            border: 1px solid var(--border);
        }
        .lang-option input { width: 18px; height: 18px; cursor: pointer; }
    </style>
</head>
<body>

    <header>
        <button class="back-btn" onclick="window.history.back()">
            <img src="../back.png" alt="Retour">
        </button>
    </header>

    <div class="container">
        <div class="user-email" id="displayEmail">Chargement...</div>

        <div class="menu-list">
            <button class="btn-action" id="btnPass" style="display: none;">Changer de mot de passe</button>
            <button class="btn-action" id="btnTheme">Changer de thème <span>🌓</span></button>
            <button class="btn-action" id="btnLang">Changer la langue <span>🌐</span></button>
            <button class="btn-action" id="btnLogout">Se déconnecter</button>
            <button class="btn-action btn-danger" id="btnDelete">Supprimer le compte</button>
        </div>
    </div>

    <div class="modal" id="modalLang">
        <div class="modal-content">
            <h3>Choisir la langue</h3>
            <div style="margin-top: 15px;">
                <label class="lang-option">Français <input type="radio" name="lang" value="fr" checked></label>
                <label class="lang-option">English <input type="radio" name="lang" value="en"></label>
                <label class="lang-option">Español <input type="radio" name="lang" value="es"></label>
            </div>
            <div class="modal-btns">
                <button onclick="closeModals()">Annuler</button>
                <button style="background: var(--accent); color: white;" onclick="saveLang()">Enregistrer</button>
            </div>
        </div>
    </div>

    <div class="modal" id="modalLogout">
        <div class="modal-content">
            <h3>Se déconnecter ?</h3>
            <p>Voulez-vous vraiment quitter TchitChat ?</p>
            <div class="modal-btns">
                <button onclick="closeModals()">Annuler</button>
                <button style="background: var(--danger); color: white;" id="confirmLogout">Déconnexion</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDU4105kXewXvvBlxkfH8MJNe6x0FQSB4o",
            authDomain: "tchitchat-ia.firebaseapp.com",
            projectId: "tchitchat-ia",
            storageBucket: "tchitchat-ia.firebasestorage.app",
            messagingSenderId: "784697397736",
            appId: "1:784697397736:web:55295804d84feafda7945d"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        onAuthStateChanged(auth, (user) => {
            if (!user) window.location.href = "../login/";
            else {
                document.getElementById('displayEmail').innerText = user.email;
                if (user.providerData.some(p => p.providerId === 'password')) {
                    document.getElementById('btnPass').style.display = 'flex';
                }
            }
        });

        // --- ACTIONS ---
        document.getElementById('btnTheme').onclick = () => {
            const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
            const target = isDark ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', target);
            localStorage.setItem('theme', target);
        };
        if(localStorage.getItem('theme') === 'dark') document.documentElement.setAttribute('data-theme', 'dark');

        document.getElementById('btnLang').onclick = () => document.getElementById('modalLang').style.display = 'flex';
        
        window.saveLang = () => {
            const selected = document.querySelector('input[name="lang"]:checked').value;
            alert("Langue enregistrée : " + selected);
            closeModals();
        };

        document.getElementById('btnLogout').onclick = () => document.getElementById('modalLogout').style.display = 'flex';
        document.getElementById('confirmLogout').onclick = () => signOut(auth);

        document.getElementById('btnPass').onclick = () => {
            sendPasswordResetEmail(auth, auth.currentUser.email).then(() => alert("Email envoyé !"));
        };

        window.closeModals = () => document.querySelectorAll('.modal').forEach(m => m.style.display = 'none');
    </script>
</body>
</html>
