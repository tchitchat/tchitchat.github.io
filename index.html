<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TchitChat</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: #f8fbff;
            color: #1f1f1f;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* --- SIDEBAR MOBILE --- */
        .sidebar {
            position: fixed;
            left: -280px;
            top: 0;
            width: 280px;
            height: 100%;
            background-color: #f0f4f9;
            z-index: 1000;
            transition: 0.3s;
            padding: 20px;
            border-right: 1px solid #dce1e7;
        }

        .sidebar.active {
            left: 0;
        }

        .brand-name {
            font-size: 22px;
            font-weight: bold;
            color: #4285f4;
            margin-bottom: 30px;
        }

        /* --- MAIN CONTENT --- */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            width: 100%;
            position: relative;
        }

        header {
            padding: 15px;
            display: flex;
            align-items: center;
        }

        .menu-toggle {
            font-size: 24px;
            cursor: pointer;
            padding: 10px;
        }

        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            text-align: center;
        }

        .hero-text h1 {
            font-size: clamp(32px, 8vw, 56px); /* S'adapte à la taille de l'écran */
            line-height: 1.2;
        }

        .gradient-text {
            background: linear-gradient(90deg, #4285f4, #9b72cb, #d96570);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            color: #c4c7c5;
        }

        /* --- SUGGESTIONS (Scrollable sur Mobile) --- */
        .suggestions {
            display: flex;
            gap: 12px;
            width: 100%;
            max-width: 800px;
            margin-top: 30px;
            overflow-x: auto; /* Permet de swiper les cartes sur tel */
            padding: 10px;
            scrollbar-width: none;
        }

        .card {
            min-width: 160px;
            background: white;
            padding: 15px;
            border-radius: 16px;
            font-size: 14px;
            text-align: left;
            cursor: pointer;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
            flex-shrink: 0;
        }

        /* --- INPUT AREA FIXÉE EN BAS --- */
        .bottom-container {
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
            padding: 10px 15px 30px 15px;
        }

        .input-box {
            background: white;
            border-radius: 28px;
            display: flex;
            align-items: center;
            padding: 10px 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
        }

        .input-box input {
            flex: 1;
            border: none;
            outline: none;
            font-size: 16px;
            padding: 8px;
        }

        .send-btn {
            color: #4285f4;
            font-size: 22px;
            cursor: pointer;
            margin-left: 10px;
            transition: 0.2s;
        }

        .send-btn:active {
            transform: scale(0.9);
        }

        .disclaimer {
            font-size: 11px;
            color: #70757a;
            margin-top: 10px;
            text-align: center;
        }

        /* Overlay quand le menu est ouvert */
        .overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.3);
            z-index: 999;
        }

        .overlay.active { display: block; }
    </style>
</head>
<body>

    <div class="overlay" id="overlay"></div>

    <aside class="sidebar" id="sidebar">
        <div class="brand-name">TchitChat</div>
        <p style="font-size: 14px; color: #5f6368;">Historique récent vide</p>
    </aside>

    <main class="main-content">
        <header>
            <div class="menu-toggle" id="menuBtn">☰</div>
        </header>

        <div class="chat-area">
            <div class="hero-text">
                <h1><span class="gradient-text">Bienvenue</span></h1>
                <h1 class="subtitle">Sur TchitChat</h1>
            </div>

            <section class="suggestions">
                <div class="card" onclick="fillInput('Rédige une blague courte')">Rédige une blague courte 🎭</div>
                <div class="card" onclick="fillInput('Idée de cadeau pour un ami')">Idée de cadeau pour un ami 🎁</div>
                <div class="card" onclick="fillInput('Recette de pâtes simple')">Recette de pâtes simple 🍝</div>
            </section>
        </div>

        <div class="bottom-container">
            <div class="input-box">
                <input type="text" id="userInput" placeholder="Demandez-moi n'importe quoi...">
                <span class="send-btn" id="sendBtn">➤</span>
            </div>
            <p class="disclaimer">TchitChat peut faire des erreurs.</p>
        </div>
    </main>

    <script>
        const sidebar = document.getElementById('sidebar');
        const menuBtn = document.getElementById('menuBtn');
        const overlay = document.getElementById('overlay');
        const sendBtn = document.getElementById('sendBtn');
        const userInput = document.getElementById('userInput');

        // Gérer le menu mobile
        menuBtn.addEventListener('click', () => {
            sidebar.classList.toggle('active');
            overlay.classList.toggle('active');
        });

        overlay.addEventListener('click', () => {
            sidebar.classList.remove('active');
            overlay.classList.remove('active');
        });

        // Fonction pour remplir l'input via les cartes
        function fillInput(text) {
            userInput.value = text;
            userInput.focus();
        }

        // Action du bouton envoyer
        sendBtn.addEventListener('click', () => {
            if(userInput.value.trim() !== "") {
                alert("Message envoyé : " + userInput.value);
                userInput.value = ""; // Vide l'input après envoi
            }
        });

        // Envoyer avec la touche Entrée
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                sendBtn.click();
            }
        });
    </script>
</body>
</html>
