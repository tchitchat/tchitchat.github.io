<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TchitChat</title>
    <link rel="icon" type="image/x-icon" href="tchitchat.ico">
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: #f8fbff;
            color: #1f1f1f;
            display: flex;
            height: 100vh;
            /* Empêche le rebond du scroll sur tout le corps */
            overflow: hidden; 
        }

        /* --- SIDEBAR --- */
        .sidebar {
            position: fixed;
            left: -280px;
            top: 0;
            width: 280px;
            height: 100%;
            background-color: #f0f4f9;
            z-index: 1000;
            transition: 0.3s;
            padding: 20px;
            border-right: 1px solid #dce1e7;
        }

        .sidebar.active {
            left: 0;
        }

        /* --- MAIN CONTENT --- */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100vh; /* Force la hauteur de l'écran */
            width: 100%;
            position: relative;
        }

        header {
            padding: 10px 15px;
            display: flex;
            align-items: center;
            flex-shrink: 0; /* Empêche le header de s'écraser */
        }

        /* Bouton Menu avec image */
        .menu-toggle {
            width: 40px;
            height: 40px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .menu-toggle img {
            width: 24px; /* Taille standard icône */
            height: auto;
        }

        /* ZONE SCROLLABLE (Le contenu du milieu) */
        .chat-area {
            flex: 1;
            overflow-y: auto; /* Seule cette partie scrolle */
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            -webkit-overflow-scrolling: touch;
        }

        .hero-text {
            margin-top: auto;
            margin-bottom: 20px;
        }

        .hero-text h1 {
            font-size: clamp(32px, 8vw, 56px);
            line-height: 1.2;
        }

        .gradient-text {
            background: linear-gradient(90deg, #4285f4, #9b72cb, #d96570);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle { color: #c4c7c5; }

        /* SUGGESTIONS */
        .suggestions {
            display: flex;
            gap: 12px;
            width: 100%;
            max-width: 800px;
            margin-bottom: auto;
            overflow-x: auto;
            padding: 10px 0;
            scrollbar-width: none;
        }

        .card {
            min-width: 160px;
            background: white;
            padding: 15px;
            border-radius: 16px;
            font-size: 14px;
            text-align: left;
            cursor: pointer;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
            flex-shrink: 0;
        }

        /* --- BARRE DE CHAT FIXÉE --- */
        .bottom-container {
            flex-shrink: 0; /* Ne bouge jamais */
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
            padding: 10px 15px 20px 15px;
            background-color: #f8fbff; /* Même couleur que le fond */
        }

        .input-box {
            background: white;
            border-radius: 28px;
            display: flex;
            align-items: center;
            padding: 5px 15px 5px 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            border: 1px solid #e1e4e8;
        }

        .input-box input {
            flex: 1;
            border: none;
            outline: none;
            font-size: 16px;
            padding: 12px 0;
            background: transparent;
        }

        .send-btn {
            width: 35px;
            height: 35px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .send-btn img {
            width: 100%;
            height: auto;
        }

        .disclaimer {
            font-size: 11px;
            color: #70757a;
            margin-top: 10px;
            text-align: center;
        }

        .overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.3);
            z-index: 999;
        }

        .overlay.active { display: block; }
    </style>
</head>
<body>

    <div class="overlay" id="overlay"></div>

    <aside class="sidebar" id="sidebar">
        <div style="font-size: 22px; font-weight: bold; color: #4285f4; margin-bottom: 30px;">TchitChat</div>
        <p style="font-size: 14px; color: #5f6368;">Historique vide</p>
    </aside>

    <main class="main-content">
        <header>
            <div class="menu-toggle" id="menuBtn">
                <img src="menu.png" alt="Menu">
            </div>
        </header>

        <div class="chat-area">
            <div class="hero-text">
                <h1><span class="gradient-text">Bienvenue</span></h1>
                <h1 class="subtitle">Sur TchitChat</h1>
            </div>

            <section class="suggestions">
                <div class="card" onclick="fillInput('Rédige une blague')">Blague 🎭</div>
                <div class="card" onclick="fillInput('Idée de cadeau')">Cadeau 🎁</div>
                <div class="card" onclick="fillInput('Recette simple')">Recette 🍝</div>
                <div class="card" onclick="fillInput('Code-moi un jeu')">Code 💻</div>
            </section>
        </div>

        <div class="bottom-container">
            <div class="input-box">
                <input type="text" id="userInput" placeholder="Ecrivez à TchitChat...">
                <div class="send-btn" id="sendBtn">
                    <img src="send.png" alt="Envoyer">
                </div>
            </div>
            <p class="disclaimer">TchitChat peut faire des erreurs.</p>
        </div>
    </main>

    <script>
        const sidebar = document.getElementById('sidebar');
        const menuBtn = document.getElementById('menuBtn');
        const overlay = document.getElementById('overlay');
        const sendBtn = document.getElementById('sendBtn');
        const userInput = document.getElementById('userInput');

        menuBtn.addEventListener('click', () => {
            sidebar.classList.add('active');
            overlay.classList.add('active');
        });

        overlay.addEventListener('click', () => {
            sidebar.classList.remove('active');
            overlay.classList.remove('active');
        });

        function fillInput(text) {
            userInput.value = text;
            userInput.focus();
        }

        sendBtn.addEventListener('click', () => {
            if(userInput.value.trim() !== "") {
                alert("Message envoyé : " + userInput.value);
                userInput.value = "";
            }
        });

        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendBtn.click();
        });
    </script>
</body>
</html>
