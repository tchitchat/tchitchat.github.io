<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Sign Up - TchitChat</title>
    <link rel="icon" type="image/x-icon" href="../tchitchat.ico">
    <style>
        :root { --bg: #f8fbff; --card-bg: white; --text: #1f1f1f; --border: #dce1e7; }
        [data-theme="dark"] { --bg: #131314; --card-bg: #1e1e20; --text: #e3e3e3; --border: #444746; }
        
        * { box-sizing: border-box; margin: 0; padding: 0; transition: background 0.3s, color 0.3s; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; min-height: 100dvh; }
        
        .auth-card { 
            background: var(--card-bg); 
            padding: 30px; 
            border-radius: 28px; 
            width: 90%; 
            max-width: 400px; 
            text-align: center; 
            border: 1px solid var(--border);
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        h1 { margin-bottom: 20px; font-size: 24px; }
        
        input { 
            width: 100%; 
            padding: 14px; 
            margin: 10px 0; 
            border-radius: 12px; 
            border: 1px solid var(--border); 
            background: transparent; 
            color: var(--text); 
            outline: none; 
            font-size: 16px;
        }

        .btn-primary { 
            width: 100%; 
            padding: 14px; 
            background: #4285f4; 
            color: white; 
            border: none; 
            border-radius: 12px; 
            cursor: pointer; 
            font-weight: 600; 
            font-size: 16px;
            margin-top: 10px;
        }

        .btn-google {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: var(--card-bg);
            color: var(--text);
            cursor: pointer;
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .footer-link { margin-top: 20px; font-size: 14px; }
        .footer-link a { color: #4285f4; text-decoration: none; font-weight: bold; }
        
        .divider { margin: 20px 0; display: flex; align-items: center; color: #70757a; font-size: 12px; }
        .divider::before, .divider::after { content: ""; flex: 1; height: 1px; background: var(--border); margin: 0 10px; }
    </style>
</head>
<body>

    <div class="auth-card">
        <h1 id="txtTitle">Sign Up</h1>
        
        <button id="googleBtn" class="btn-google">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18">
            <span id="txtGoogle">Sign up with Google</span>
        </button>

        <div class="divider" id="txtDivider">or</div>

        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Password (6+ chars)">
        
        <button class="btn-primary" id="signupBtn">Create Account</button>
        
        <p class="footer-link">
            <span id="txtHaveAccount">Already have an account?</span> 
            <a href="../login/" id="txtLink">Login</a>
        </p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyDU4105kXewXvvBlxkfH8MJNe6x0FQSB4o", 
            authDomain: "tchitchat-ia.firebaseapp.com", 
            projectId: "tchitchat-ia", 
            storageBucket: "tchitchat-ia.firebasestorage.app", 
            messagingSenderId: "784697397736", 
            appId: "1:784697397736:web:55295804d84feafda7945d" 
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // Appliquer le thème
        document.documentElement.setAttribute('data-theme', localStorage.getItem('theme') || 'light');

        // Gérer la langue
        const lang = localStorage.getItem('lang') || (navigator.language.startsWith('fr') ? 'fr' : 'en');
        if (lang === 'fr') {
            document.getElementById('txtTitle').innerText = "Inscription";
            document.getElementById('txtGoogle').innerText = "S'inscrire avec Google";
            document.getElementById('txtDivider').innerText = "ou";
            document.getElementById('email').placeholder = "Email";
            document.getElementById('password').placeholder = "Mot de passe (6+ carac.)";
            document.getElementById('signupBtn').innerText = "Créer le compte";
            document.getElementById('txtHaveAccount').innerText = "Déjà un compte ?";
            document.getElementById('txtLink').innerText = "Se connecter";
        }

        // Inscription Google
        document.getElementById('googleBtn').onclick = () => {
            signInWithPopup(auth, new GoogleAuthProvider())
                .then(() => window.location.href = "../")
                .catch(e => alert(e.message));
        };

        // Inscription Email
        document.getElementById('signupBtn').onclick = () => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            createUserWithEmailAndPassword(auth, email, password)
                .then(() => window.location.href = "../")
                .catch(e => {
                    let msg = e.message;
                    if (e.code === 'auth/email-already-in-use') msg = (lang === 'fr' ? "Email déjà utilisé." : "Email already in use.");
                    if (e.code === 'auth/weak-password') msg = (lang === 'fr' ? "Mot de passe trop court." : "Password too weak.");
                    alert(msg);
                });
        };
    </script>
</body>
</html>
