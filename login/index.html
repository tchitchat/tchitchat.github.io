<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Login - TchitChat</title>
    <link rel="icon" type="image/x-icon" href="../tchitchat.ico">
    <style>
        :root { --bg: #f8fbff; --card-bg: white; --text: #1f1f1f; --border: #dce1e7; }
        [data-theme="dark"] { --bg: #131314; --card-bg: #1e1e20; --text: #e3e3e3; --border: #444746; }
        
        * { box-sizing: border-box; margin: 0; padding: 0; transition: background 0.3s, color 0.3s; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; min-height: 100dvh; }
        
        .auth-card { 
            background: var(--card-bg); 
            padding: 40px 30px; 
            border-radius: 28px; 
            width: 90%; 
            max-width: 400px; 
            text-align: center; 
            border: 1px solid var(--border);
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }

        .logo-img { width: 60px; height: 60px; margin-bottom: 15px; border-radius: 12px; }
        h1 { margin-bottom: 25px; font-size: 24px; font-weight: 600; }
        
        .btn-google {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: var(--card-bg);
            color: var(--text);
            cursor: pointer;
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-size: 15px;
        }

        .divider { margin: 20px 0; display: flex; align-items: center; color: #70757a; font-size: 13px; }
        .divider::before, .divider::after { content: ""; flex: 1; height: 1px; background: var(--border); margin: 0 10px; }

        input { 
            width: 100%; 
            padding: 14px; 
            margin-bottom: 12px; 
            border-radius: 12px; 
            border: 1px solid var(--border); 
            background: transparent; 
            color: var(--text); 
            outline: none; 
            font-size: 16px;
        }
        input:focus { border-color: #4285f4; border-width: 2px; padding: 13px; }

        .btn-primary { 
            width: 100%; 
            padding: 14px; 
            background: #4285f4; 
            color: white; 
            border: none; 
            border-radius: 12px; 
            cursor: pointer; 
            font-weight: 600; 
            font-size: 16px;
            margin-top: 10px;
        }

        .footer-link { margin-top: 25px; font-size: 14px; color: #70757a; }
        .footer-link a { color: #4285f4; text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>

    <div class="auth-card">
        <img src="../logo.png" alt="TchitChat Logo" class="logo-img">
        <h1 id="txtTitle">Login</h1>
        
        <button id="googleBtn" class="btn-google">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18">
            <span id="txtGoogle">Continue with Google</span>
        </button>

        <div class="divider" id="txtDivider">or</div>

        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Password">
        
        <button class="btn-primary" id="loginBtn">Login</button>
        
        <p class="footer-link">
            <span id="txtNoAccount">No account?</span> 
            <a href="../signup/" id="txtLink">Sign Up</a>
        </p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";

        const firebaseConfig = { apiKey: "AIzaSyDU4105kXewXvvBlxkfH8MJNe6x0FQSB4o", authDomain: "tchitchat-ia.firebaseapp.com", projectId: "tchitchat-ia", storageBucket: "tchitchat-ia.firebasestorage.app", messagingSenderId: "784697397736", appId: "1:784697397736:web:55295804d84feafda7945d" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        document.documentElement.setAttribute('data-theme', localStorage.getItem('theme') || 'light');
        const lang = localStorage.getItem('lang') || (navigator.language.startsWith('fr') ? 'fr' : 'en');
        
        if(lang === 'fr') {
            document.getElementById('txtTitle').innerText = "Connexion";
            document.getElementById('txtGoogle').innerText = "Continuer avec Google";
            document.getElementById('txtDivider').innerText = "ou";
            document.getElementById('loginBtn').innerText = "Se connecter";
            document.getElementById('txtNoAccount').innerText = "Pas de compte ?";
            document.getElementById('txtLink').innerText = "S'inscrire";
        }

        document.getElementById('googleBtn').onclick = () => signInWithPopup(auth, new GoogleAuthProvider()).then(() => window.location.href="../");
        document.getElementById('loginBtn').onclick = () => {
            const e = document.getElementById('email').value;
            const p = document.getElementById('password').value;
            signInWithEmailAndPassword(auth, e, p).then(() => window.location.href="../").catch(err => alert(err.message));
        };
    </script>
</body>
</html>
